<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Library</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="wrap">
      <h1>PDF Library</h1>
      <p class="subtitle">Embedded previews, paginated, and static.</p>
    </div>
  </header>

  <main class="wrap">
    <section class="controls">
      <input
        id="searchInput"
        type="search"
        placeholder="Search titles, notes, or URLs"
        aria-label="Search PDFs"
      />
      <div class="meta">
        <span id="status">Loading…</span>
      </div>
    </section>

    <section id="gallery" class="list" aria-live="polite"></section>

    <nav id="pagination" class="pager" aria-label="Pagination"></nav>
  </main>

  <footer class="wrap footer">
    <small>Edit <code>links.csv</code> and redeploy. No build step needed.</small>
  </footer>

  <script src="app.js"></script>
</body>
</html>
